openapi: 3.1.0
info:
  title: gotomemory share API
  version: 0.0.0
paths:
  /v1/shares:
    post:
      summary: Create a read-only conversation share
    get:
      summary: List the current user's shares
  /v1/shares/{id}:
    get:
      summary: Read one owned share
    patch:
      summary: Update metadata, visibility, expiry, or status
    delete:
      summary: Delete a share immediately
  /v1/shares/public/{slug}:
    get:
      summary: Read a public or unlocked share
  /v1/shares/public/{slug}/unlock:
    post:
      summary: Exchange a password for a short-lived view token
