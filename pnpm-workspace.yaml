packages:
  - "apps/*"
  - "packages/*"

# Approve install scripts for trusted deps under pnpm's secure-by-default gating.
# esbuild (vitest/tsx) ships a prebuilt binary; spawn-sync (wxt toolchain) builds a helper.
onlyBuiltDependencies:
  - esbuild
  - spawn-sync

allowBuilds:
  esbuild: true
  spawn-sync: true
