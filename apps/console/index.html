<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>gotomemory console</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, sans-serif;
        color: #17202a;
      }
      body {
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.4rem;
      }
      fieldset {
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        margin: 0 0 1rem;
      }
      input,
      select,
      button,
      textarea {
        font: inherit;
        padding: 0.4rem 0.5rem;
        margin: 0.2rem 0.2rem 0.2rem 0;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        padding: 0.35rem 0;
        border-bottom: 1px solid #edf1f5;
      }
      .sens {
        font-size: 0.75rem;
        padding: 0.05rem 0.4rem;
        border-radius: 99px;
        background: #eef2ff;
      }
      .sens.private {
        background: #fff7ed;
      }
      .sens.secret {
        background: #fef2f2;
      }
      em {
        color: #607080;
        font-size: 0.8rem;
      }
      pre {
        background: #f7f8fa;
        padding: 0.75rem;
        border-radius: 8px;
        white-space: pre-wrap;
      }
      .omitted {
        color: #b45309;
        font-size: 0.85rem;
      }
      code {
        background: #f2f5f8;
        padding: 0 0.2rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>gotomemory console</h1>
    <fieldset>
      <legend>Connection</legend>
      <input id="baseUrl" value="http://localhost:8787/v1" size="34" />
      <input id="token" value="t1:u1" size="12" />
    </fieldset>

    <fieldset>
      <legend>Create</legend>
      <select id="type">
        <option>preference</option>
        <option>fact</option>
        <option>note</option>
        <option>credential_hint</option>
      </select>
      <input id="content" placeholder="memory content" size="40" />
      <button id="createBtn">Save</button>
    </fieldset>

    <fieldset>
      <legend>Search</legend>
      <input id="query" placeholder="query" size="30" />
      <button id="searchBtn">Search</button>
      <ul id="results"></ul>
    </fieldset>

    <fieldset>
      <legend>Build context</legend>
      <input id="task" placeholder="task" size="40" />
      <button id="buildBtn">Build</button>
      <div id="context"></div>
    </fieldset>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
